<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>彼女.com ❤️</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#ffeef2;
    margin:0;
    padding-top:50px;
}

h1{
    color:#ff4f81;
}

img{
    width:300px;
    border-radius:15px;
}

/* YESとNOを重ねるための箱 */
#buttonArea{
    position:relative;
    display:inline-block;
    margin-top:20px;
}

button{
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:#ff6b9d;
    color:white;
}

#no{
    position:absolute;
    top:0;
    left:0;
    background:#ddd;
    z-index:999;
}

/* NO専用の逃走エリア */
#container{
    position:relative;
    width:900px;
    max-width:90vw;
    height:300px;
    margin:30px auto 0;
}
</style>

</head>

<body>

<h1>今日あそぼ？🥺</h1>

<img src="mayouChikawa.gif" alt="ちいかわ">

<br>

<div id="buttonArea">
    <button id="yes">うん❤️</button>
    <button id="no">やだ😒</button>
</div>

<div id="container"></div>


<script>
    // スマホ・タブレット判定
const isMobile = /Android|iPhone|iPad|iPod|Windows Phone|Mobile/i.test(navigator.userAgent)|| window.innerWidth <= 900;;

if (isMobile) {
    document.body.innerHTML = `
        <div style="
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#ffeef2;
            text-align:center;
            font-family:sans-serif;
            padding:20px;
        ">
            <h1 style="color:#ff4f81;font-size:40px;">
                ⚠️ PCからアクセスしてください
            </h1>

            <p style="font-size:22px;color:#555;">
                このサイトはパソコン専用です💻
            </p>
        </div>
    `;
    throw new Error("Mobile access blocked");
}

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const container = document.getElementById("container");

let escaped = false;

function moveButton(){

    const maxX = container.clientWidth - noBtn.offsetWidth;
    const maxY = container.clientHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    // 最初の1回だけ逃走エリアへ移動
    if(!escaped){
        container.appendChild(noBtn);
        escaped = true;
    }

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveButton);

noBtn.addEventListener("touchstart", (e)=>{
    e.preventDefault();
    moveButton();
});

noBtn.addEventListener("click", (e)=>{
    e.preventDefault();
    moveButton();
});

yesBtn.addEventListener("click", ()=>{
    document.body.innerHTML = `
        <div style="margin-top:100px;">
            <h1 style="color:#ff4f81;font-size:50px;">
                そう言うと思った！🥳❤️
            </h1>

            <img src="chikawauresi.gif" width="350">

            <p style="font-size:24px;">
                電話して！
            </p>

        </div>
    `;
});
</script>

</body>
</html>
